name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Triggers on either main or master, whichever you use

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile Application (Vite Build)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Clean server artifact (Not needed for static hosting)
        run: rm -f dist/server.cjs*

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite compiles files into
          branch: gh-pages # The target branch for GitHub Pages
          clean: true
